name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 -m pip install PyYAML
      - run: bash tests/test-org-plan.sh
      - run: bash tests/test-install.sh
      - run: bash tests/test-plugin-layout.sh
      - run: bash tests/test-superpowers-vendor.sh
      - run: bash tests/test-skills-discovery.sh
      - run: bash tests/test-shellcheck-org-plan.sh
      - run: bash -n tests/*.sh install.sh plugins/org-plan/skills/org-plan/scripts/org-plan
      - run: python3 -m json.tool plugins/org-plan/.codex-plugin/plugin.json >/dev/null
      - run: python3 -m json.tool plugins/superpowers/.codex-plugin/plugin.json >/dev/null
      - run: ruby -e 'require "yaml"; Dir["plugins/*/skills/*/agents/openai.yaml"].each { |path| YAML.load_file(path) }'
      - run: git diff --check

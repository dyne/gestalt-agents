name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/run.sh
      - run: find tests -type f -name '*.sh' -exec bash -n {} +
      - run: bash -n plugins/gestalt/skills/org-plan/scripts/org-plan
      - run: python3 -m json.tool plugins/gestalt/.codex-plugin/plugin.json >/dev/null
      - run: ruby -e 'require "yaml"; Dir["plugins/*/skills/*/agents/openai.yaml"].each { |path| YAML.load_file(path) }'
      - run: git diff --check
